name: Docker – EEST reproducibility image

on:
  workflow_dispatch:
  push:
    tags:
      - 'docker/*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: verified-zkevm/evm-asm

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          # submodules excluded via .dockerignore; skip for faster checkout
          submodules: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=zkevm-v0.4.0-{{sha}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA layer cache: ziskemu Rust build and Lean build are both cached
          # after the first run, so subsequent pushes are fast.
          cache-from: type=gha
          cache-to: type=gha,mode=max
