name: 'PR Summary'

on:
  pull_request_target:
    types: [opened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      # Pre-steps: own checkout so we can compute the deterministic
      # PROGRESS.md base↔head delta before the summary action runs its
      # own checkout. Files written to /tmp survive the action's
      # checkout (which only touches the workspace).
      - name: Checkout (full history for base diff)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Compute deterministic progress delta
        id: progress_delta
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -uo pipefail
          # Parses PROGRESS.md at base + head, emits structured Markdown
          # (count deltas + per-opcode tier transitions + risk scorecard).
          # Pure git+awk; no LLM. Output is consumed below as part of the
          # augmented instructions file passed to the summary action.
          #
          # SECURITY (pull_request_target hardening). This workflow runs with a
          # WRITE token + the GEMINI_API_KEY secret and checks out the PR head,
          # so executing the PR's own copy of progress-delta.sh would let a
          # malicious PR exfiltrate the secret / abuse the token. The script
          # only READS committed PROGRESS.md blobs via `git show`, so running the
          # BASE (trusted) version against either-side data is safe. We overwrite
          # the workspace copy with the base blob before running it. Consequence:
          # a PR that edits progress-delta.sh is summarized with the base logic
          # (the new logic takes effect once merged) — an acceptable, cosmetic
          # lag, never a correctness or token-safety compromise.
          git fetch --depth=1 origin "$BASE_SHA" >/dev/null 2>&1 || true
          if git show "${BASE_SHA}:scripts/progress-delta.sh" > scripts/progress-delta.sh 2>/dev/null; then
            echo "progress-delta: pinned to trusted base ${BASE_SHA}"
            scripts/progress-delta.sh "$BASE_SHA" "$HEAD_SHA" > /tmp/progress-delta.md \
              || : > /tmp/progress-delta.md
          else
            echo "::warning::base progress-delta.sh unavailable; emitting empty delta (refusing to run PR-head code with a privileged token)"
            : > /tmp/progress-delta.md
          fi
          echo "Generated /tmp/progress-delta.md ($(wc -l < /tmp/progress-delta.md) lines)"

      - name: Build augmented instructions file
        run: |
          # Concatenate (in order):
          #   1. CONTRIBUTING.md       — existing style guidance
          #   2. progress-delta.md     — PR-specific deterministic facts
          #   3. pr-summary-progress-prompt.md — LLM output-shape rules
          #
          # The LLM consumes this as its analysis-time context.
          # Sections are separated by horizontal rules so the model
          # can tell them apart in the synthesis prompt.
          {
            echo "# Deployment-supplied instructions for evm-asm"
            echo
            echo "## Style guidance (from CONTRIBUTING.md)"
            echo
            cat CONTRIBUTING.md
            echo
            echo "---"
            echo
            cat /tmp/progress-delta.md
            echo
            echo "---"
            echo
            cat docs/pr-summary-progress-prompt.md
          } > /tmp/augmented-instructions.md
          echo "Built /tmp/augmented-instructions.md ($(wc -l < /tmp/augmented-instructions.md) lines)"

      - name: Generate PR Summary
        uses: alexanderlhicks/lean-summary-workflow@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          api_key: ${{ secrets.GEMINI_API_KEY }}
          provider: gemini  # or: anthropic, openai
          model: gemini-3-flash-preview  # or: claude-sonnet-4-6, gpt-5.4-mini
          github_repository: ${{ github.repository }}
          pr_number: ${{ github.event.pull_request.number }}
          # NOTE: input name change pending — see lean-summary-workflow PR
          # that renames `style_guide_path` → `additional_instructions_path`.
          # When that lands, swap the line below and drop this NOTE.
          additional_instructions_path: '/tmp/augmented-instructions.md'
          validate_title: 'true'
          # upstream_path: 'ToMathlib/'
